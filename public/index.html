<!DOCTYPE html>
<html>
<head>
  <title>AI Caller</title>
</head>
<body>
  <h1>Real-Time AI Caller</h1>
  <button id="startBtn">Start Call</button>

  <script src="https://unpkg.com/livekit-client/dist/livekit-client.umd.js"></script>

  <script>
    let ws;
    let currentAudio = null;

    document.getElementById("startBtn").onclick = async () => {
      console.log("Starting...");

      const res = await fetch("/token");
      const data = await res.json();

      const room = new LivekitClient.Room();
      await room.connect(data.url, data.token);

      await room.localParticipant.setMicrophoneEnabled(true);

      console.log("MIC LIVE");

      // =========================
      // WEBSOCKET
      // =========================
      ws = new WebSocket(`wss://${location.host}/`);

      ws.onopen = () => console.log("WS CONNECTED");
      ws.onerror = (e) => console.error("WS ERROR", e);

      // =========================
      // MIC PIPELINE (RAW PCM)
      // =========================
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

      const audioContext = new AudioContext({ sampleRate: 48000 });
      const source = audioContext.createMediaStreamSource(stream);

      const processor = audioContext.createScriptProcessor(4096, 1, 1);

      source.connect(processor);

      // 🔥 silent output (prevents echo but keeps processing alive)
      const silentGain = audioContext.createGain();
      silentGain.gain.value = 0;

      processor.connect(silentGain);
      silentGain.connect(audioContext.destination);

      processor.onaudioprocess = (e) => {
        if (ws.readyState !== 1) return;

        // 🔥 interrupt AI if user speaks
        if (currentAudio) {
          currentAudio.pause();
          currentAudio = null;
        }

        const input = e.inputBuffer.getChannelData(0);

        const buffer = new ArrayBuffer(input.length * 2);
        const view = new DataView(buffer);

        for (let i = 0; i < input.length; i++) {
          let s = Math.max(-1, Math.min(1, input[i]));
          view.setInt16(i * 2, s * 0x7fff, true);
        }

        ws.send(buffer);
      };

      // =========================
      // PLAY AI AUDIO
      // =========================
      ws.onmessage = (msg) => {
        console.log("AI AUDIO RECEIVED");

        // 🔥 stop previous audio
        if (currentAudio) {
          currentAudio.pause();
          currentAudio = null;
        }

        const audio = new Audio(
          "data:audio/mp3;base64," + msg.data
        );

        currentAudio = audio;
        audio.play();
      };
    };
  </script>
</body>
</html>
