<!DOCTYPE html>
<html>
<head>
  <title>AI Caller</title>
</head>
<body>
  <h1>Real-Time AI Caller</h1>
  <button id="startBtn">Start Call</button>

  <script src="https://unpkg.com/livekit-client/dist/livekit-client.umd.js"></script>

  <script>
    let ws;
    let currentAudio = null;

    let speakingFrames = 0;
    let interruptTimeout = null;
    let aiStartTime = 0;
    let userStartedSpeakingAt = null;

    document.getElementById("startBtn").onclick = async () => {
      console.log("Starting...");

      const unlockCtx = new AudioContext();
      await unlockCtx.resume();

      const res = await fetch("/token");
      const data = await res.json();

      const room = new LivekitClient.Room();
      await room.connect(data.url, data.token);

      await room.localParticipant.setMicrophoneEnabled(true);

      ws = new WebSocket(`wss://${location.host}/`);

      ws.onopen = () => console.log("WS CONNECTED");

      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

      const audioContext = new AudioContext({ sampleRate: 48000 });
      const source = audioContext.createMediaStreamSource(stream);

      const processor = audioContext.createScriptProcessor(4096, 1, 1);

      source.connect(processor);

      // 🔇 silent output (keeps processing alive, no echo)
      const silentGain = audioContext.createGain();
      silentGain.gain.value = 0;

      processor.connect(silentGain);
      silentGain.connect(audioContext.destination);

      processor.onaudioprocess = (e) => {
        if (ws.readyState !== 1) return;

        const input = e.inputBuffer.getChannelData(0);

        // 🔊 volume detection
        let sum = 0;
        for (let i = 0; i < input.length; i++) {
          sum += Math.abs(input[i]);
        }
        const volume = sum / input.length;

        // 🎙 detect sustained speaking
        if (volume > 0.04) {
          speakingFrames++;

          if (!userStartedSpeakingAt) {
            userStartedSpeakingAt = Date.now();
          }
        } else {
          speakingFrames = 0;
          userStartedSpeakingAt = null;
        }

        const aiTalkingLongEnough = Date.now() - aiStartTime > 800;

        // 🧠 NATURAL OVERLAP INTERRUPTION
        if (
          speakingFrames > 3 &&
          currentAudio &&
          aiTalkingLongEnough &&
          userStartedSpeakingAt &&
          Date.now() - userStartedSpeakingAt > 600
        ) {
          if (!interruptTimeout) {
            interruptTimeout = setTimeout(() => {
              if (currentAudio) {
                console.log("INTERRUPT (natural overlap)");
                currentAudio.pause();
                currentAudio = null;
              }
              interruptTimeout = null;
            }, 300); // 👈 smooth finish
          }
        } else {
          interruptTimeout = null;
        }

        // 🎧 send audio
        const buffer = new ArrayBuffer(input.length * 2);
        const view = new DataView(buffer);

        for (let i = 0; i < input.length; i++) {
          let s = Math.max(-1, Math.min(1, input[i]));
          view.setInt16(i * 2, s * 0x7fff, true);
        }

        ws.send(buffer);
      };

      ws.onmessage = (msg) => {
        console.log("AI AUDIO RECEIVED");

        if (currentAudio) {
          currentAudio.pause();
          currentAudio = null;
        }

        const byteCharacters = atob(msg.data);
        const byteNumbers = new Array(byteCharacters.length);

        for (let i = 0; i < byteCharacters.length; i++) {
          byteNumbers[i] = byteCharacters.charCodeAt(i);
        }

        const byteArray = new Uint8Array(byteNumbers);

        const blob = new Blob([byteArray], { type: "audio/mpeg" });
        const url = URL.createObjectURL(blob);

        const audio = new Audio(url);
        currentAudio = audio;

        // 🧠 track when AI starts speaking
        aiStartTime = Date.now();

        audio.play().catch(err => {
          console.error("Playback error:", err);
        });
      };
    };
  </script>
</body>
</html>
